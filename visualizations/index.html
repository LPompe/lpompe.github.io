<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visualizations – Lucas Pompe</title>
<meta name="description" content="Interactive data visualizations on World Cup coaching, Elo ratings, and more by Lucas Pompe.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #f7f6f2;
    --surface: #ffffff;
    --border:  rgba(0,0,0,0.09);
    --text:    #111110;
    --muted:   #6b6a66;
    --nav-h:   44px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ---- compact sticky nav ---- */
  .top-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    height: var(--nav-h);
    background: rgba(247,246,242,0.88);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 20px;
    overflow-x: auto;
    white-space: nowrap;
  }

  .nav-home {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
    text-decoration: none;
    padding-right: 16px;
    border-right: 1px solid var(--border);
    margin-right: 12px;
    flex-shrink: 0;
    transition: color .15s;
  }
  .nav-home:hover { color: var(--text); }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 2px;
    list-style: none;
  }
  .nav-links a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    border-radius: 7px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    transition: background .15s, color .15s;
  }
  .nav-links a:hover {
    background: rgba(0,0,0,0.05);
    color: var(--text);
  }
  .nav-links a .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ---- sections ---- */
  .section {
    padding: 48px 20px 0;
    max-width: 820px;
    margin: 0 auto;
  }

  /* layout with left text column and main content shifted right */
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 24px;
    max-width: 1240px;
    margin: 0 auto;
    padding-top: 0;
  }
  .left-col {
    padding: 48px 12px 20px 20px;
    font-size: 14px;
    color: var(--muted);
  }
  .content { padding-left: 0; }

  .section-header {
    margin-bottom: 16px;
  }
  .section-num {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .section-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .section-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 580px;
  }

  /* ---- iframe wrapper ---- */
  .viz-frame {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: visible;
    background: var(--surface);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .viz-frame iframe {
    display: block;
    width: 100%;
    border: none;
  }

  /* ---- divider ---- */
  .divider {
    max-width: 820px;
    margin: 48px auto 0;
    border: none;
    border-top: 1px solid var(--border);
  }

  /* ---- footer ---- */
  .foot {
    max-width: 820px;
    margin: 48px auto 0;
    padding: 20px 20px 60px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .foot a { color: inherit; text-underline-offset: 2px; }
</style>
</head>
<body>

<!-- ── compact sticky nav ── -->
<nav class="top-nav">
  <a class="nav-home" href="https://lpompe.github.io">← lpompe.github.io</a>
  <ul class="nav-links">
    <li><a href="#foreign"><span class="dot" style="background:#c9a227;"></span>Foreign Coaches</a></li>
    <li><a href="#bracket"><span class="dot" style="background:#6a9e6f;"></span>Bracket Chart</a></li>
    <li><a href="#elo"><span class="dot" style="background:#5b8fa8;"></span>Elo Explainer</a></li>
    <li><a href="#scatter"><span class="dot" style="background:#bd6b4a;"></span>Expected vs Actual</a></li>
  </ul>
</nav>

<div class="layout">
  <aside class="left-col" id="viz-left-col">
    <!-- Left column: add your explanatory text here -->
  </aside>
  <div class="content">

  <!-- ── 1. Foreign coaches ── -->
  <section class="section" id="foreign">
  <div class="viz-frame">
    <iframe id="iframe-foreign" src="foreign_coaches_chart.html" height="820" scrolling="no" title="Foreign vs domestic coaches chart"></iframe>
  </div>
</section>
  </section>

  <hr class="divider">

  <!-- ── 2. Bracket ── -->
  <section class="section" id="bracket">
  <div class="viz-frame">
    <iframe id="iframe-bracket" src="bracket_chart.html" height="900" scrolling="no" title="World Cup bracket chart"></iframe>
  </div>
</section>

<hr class="divider">

<!-- ── 3. Elo explainer ── -->
<section class="section" id="elo">
  <div class="viz-frame">
    <iframe id="iframe-elo" src="elo_explainer_nl_arg.html" height="900" scrolling="no" title="Elo ratings explainer"></iframe>
  </div>
</section>

<hr class="divider">

<!-- ── 4. Scatter ── -->
<section class="section" id="scatter">
  <div class="viz-frame">
    <iframe id="iframe-scatter" src="expected_vs_real_scatter.html" height="1100" scrolling="no" title="Simulated vs. actual round scatter plot"></iframe>
  </div>

<script>
// Listen for height messages from embedded visualizations and resize iframes
window.addEventListener('message', (e) => {
  try {
    const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    if (!data || data.type !== 'vizHeight') return;
    const iframe = document.getElementById(data.id);
    if (iframe && data.height && !isNaN(data.height)) {
      iframe.style.height = (data.height) + 'px';
    }
  } catch (err) {
    // ignore malformed messages
  }
}, false);
</script>
</section>
  </section>

  <div class="foot">
    Built by <a href="https://lpompe.github.io">Lucas Pompe</a> &mdash;
    Data: Elo ratings from <a href="https://eloratings.net">eloratings.net</a>, Maddison Project Database 2023
  </div>

  </div> <!-- .content -->
</div> <!-- .layout -->

</body>
</html>
